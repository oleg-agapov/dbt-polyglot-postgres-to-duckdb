polyglot_demo:
  target: postgres
  outputs:
    postgres:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'dbt') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'dbt') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'analytics') }}"
      schema: analytics
      threads: 4

    duckdb:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', 'data/analytics.duckdb') }}"
      schema: analytics
      threads: 4
